openapi: 3.0.3
info:
  title: Candy Retailer Training API
  version: 1.0.0
servers:
  - url: http://localhost:8000
paths:
  /account:
    get:
      summary: GetAccount by phone
      parameters:
        - in: query
          name: phone
          schema:
            type: string
          required: true
          description: Phone number (any format)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
  /orders:
    get:
      summary: GetOrders by phone, account_id, or order_id
      parameters:
        - in: query
          name: phone
          schema: { type: string }
          required: false
        - in: query
          name: account_id
          schema: { type: string }
          required: false
        - in: query
          name: order_id
          schema: { type: string }
          required: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
  /orders/{order_id}/cancel:
    post:
      summary: CancelOrder
      parameters:
        - in: path
          name: order_id
          schema: { type: string }
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
components:
  schemas:
    Account:
      type: object
      required: [account_id, name, email, loyalty_points]
      properties:
        account_id: { type: string, example: CUST-2001 }
        name: { type: string, example: Sarah Chen }
        email: { type: string, example: sarah.chen@email.com }
        phone: { type: string, example: "+1 (415) 555-0101", nullable: true }
        loyalty_points: { type: integer, example: 450 }
        tier: { type: string, example: Gold }
    OrderItem:
      type: object
      required: [item_name, quantity, unit_price]
      properties:
        item_name: { type: string, example: Gummy Bears }
        quantity: { type: integer, example: 2 }
        unit_price: { type: number, format: float, example: 4.99 }
    Order:
      type: object
      required: [order_id, status, eta, items, total_amount]
      properties:
        order_id: { type: string, example: ORD-5001 }
        account_id: { type: string, example: CUST-2001, nullable: true }
        status: { type: string, enum: [pending, processing, shipped, delivered, cancelled], example: delivered }
        eta: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        total_amount: { type: number, format: float, example: 13.98 }
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
